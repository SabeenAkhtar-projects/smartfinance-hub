<html lang="en">

  <title>Forgot Password — SmartFinance Hub</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Inter',sans-serif;
      min-height:100vh;
      background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);
      display:flex;align-items:center;justify-content:center;padding:20px;
    }
    .auth-container{width:100%;max-width:440px}
    .auth-logo{text-align:center;margin-bottom:32px}
    .auth-logo a{text-decoration:none;display:inline-flex;align-items:center;gap:10px}
    .logo-icon{
      width:44px;height:44px;
      background:linear-gradient(135deg,#6366f1,#8b5cf6);
      border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;
    }
    .logo-text{font-size:22px;font-weight:700;color:#fff}
    .logo-text span{color:#6366f1}
    .auth-card{
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:20px;padding:40px;
      backdrop-filter:blur(20px);
    }
    .icon-circle{
      width:64px;height:64px;
      background:linear-gradient(135deg,rgba(99,102,241,0.2),rgba(139,92,246,0.2));
      border:1px solid rgba(99,102,241,0.4);
      border-radius:50%;display:flex;align-items:center;justify-content:center;
      font-size:28px;margin:0 auto 20px;
    }
    .auth-title{font-size:24px;font-weight:700;color:#fff;margin-bottom:8px;text-align:center}
    .auth-subtitle{font-size:14px;color:#94a3b8;text-align:center;margin-bottom:28px;line-height:1.6}
    .form-group{margin-bottom:20px}
    .form-group label{display:block;font-size:14px;font-weight:500;color:#cbd5e1;margin-bottom:8px}
    .form-group input{
      width:100%;padding:12px 16px;
      background:rgba(255,255,255,0.07);
      border:1px solid rgba(255,255,255,0.12);
      border-radius:10px;color:#fff;font-size:15px;
      font-family:'Inter',sans-serif;
      transition:border-color 0.2s,background 0.2s;outline:none;
    }
    .form-group input:focus{border-color:#6366f1;background:rgba(99,102,241,0.08)}
    .form-group input::placeholder{color:#475569}
    .btn-primary{
      width:100%;padding:14px;
      background:linear-gradient(135deg,#6366f1,#8b5cf6);
      color:#fff;border:none;border-radius:10px;
      font-size:16px;font-weight:600;cursor:pointer;
      transition:opacity 0.2s,transform 0.1s;
      font-family:'Inter',sans-serif;margin-bottom:20px;
    }
    .btn-primary:hover{opacity:0.9;transform:translateY(-1px)}
    .btn-secondary{
      width:100%;padding:13px;
      background:transparent;
      border:1px solid rgba(255,255,255,0.15);
      border-radius:10px;color:#94a3b8;
      font-size:15px;font-weight:500;cursor:pointer;
      font-family:'Inter',sans-serif;
      transition:background 0.2s,color 0.2s;
      text-decoration:none;display:block;text-align:center;
    }
    .btn-secondary:hover{background:rgba(255,255,255,0.05);color:#fff}
